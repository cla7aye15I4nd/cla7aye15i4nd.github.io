name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Type check
        run: uv run mypy

      - name: Lint
        run: uv run ruff check .

      - name: Restore cached resume
        id: resume-cache
        uses: actions/cache@v4
        with:
          path: paper/resume.pdf
          key: ${{ runner.os }}-resume-${{ hashFiles('resume/**') }}

      - name: Build resume
        if: steps.resume-cache.outputs.cache-hit != 'true'
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: resume
          latexmk_use_lualatex: false
          args: -pdf -interaction=nonstopmode -jobname=resume

      - name: Stage resume into paper/
        if: steps.resume-cache.outputs.cache-hit != 'true'
        run: mv resume/resume.pdf paper/resume.pdf

      - name: Verify resume PDF
        run: test -s paper/resume.pdf

      - name: Build site
        run: uv run site build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
