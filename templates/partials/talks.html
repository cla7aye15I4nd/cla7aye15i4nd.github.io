<h3 id="talks">{{ site.data.profile.sections.talks }}</h3>
<ul>
{% for talk in site.data.talks %}
  <li>
    <p>
      <a href="{{ talk.url }}" target="_blank"><b>{{ talk.title }}</b></a>
      {% for link in talk.links | default([]) %}
        <a href="{{ link.url }}" target="_blank">[{{ link.label }}]</a>
      {% endfor %}
    </p>
    {{ talk.venue }}
  </li>
{% endfor %}
</ul>
