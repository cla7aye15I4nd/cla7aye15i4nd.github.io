about:
  - >-
    My name is Zheng Yu.
    I am currently a Security Research Engineer at
    <a href="https://www.depthfirst.com/" target="_blank">DepthFirst</a>, working on
    LLM-based agent systems for automated vulnerability discovery and penetration testing,
    covering web applications, low-level systems, and end-to-end pentest workflows.
  - >-
    I completed my PhD in the Computer Science department at
    <a href="https://www.northwestern.edu/" target="_blank">Northwestern University</a>,
    advised by
    <a href="http://xinyuxing.org/" target="_blank">Prof. Xinyu Xing</a>.
    I obtained my bachelor's degree from the
    <a href="https://acm.sjtu.edu.cn/home" target="_blank">ACM Honor Class</a> at
    <a href="https://www.sjtu.edu.cn/" target="_blank">Shanghai Jiao Tong University</a>,
    majoring in Computer Science. My advisor was
    <a href="https://www.cs.sjtu.edu.cn/~lichao/cn/index-cn.html" target="_blank">Prof. Chao Li</a>.
    Additionally, I was also very fortunate to be advised by
    <a href="https://cs.uwaterloo.ca/~m285xu/" target="_blank">Prof. Meng Xu</a> at the University of Waterloo
    during my research visits.
  - >-
    Besides, I am very interested in and good at <b>algorithm</b> design. I
    was an OIer when I was studying at <a href="https://en.wikipedia.org/wiki/Yali_High_School"
    target="_blank">Yali</a>. I am
    also a <b>CTF</b> player; I used to play CTF with
    <a href="https://www.nu1l.com/" target="_blank">Nu1L</a> and
    <a href="https://strawhat.team/" target="_blank">StrawHat</a>.
  - >-
    Outside of research, I enjoy traveling and painting, including watercolor and sketching. Here is a
    <a href="https://gallery.dataisland.org" target="_blank">gallery</a> that is still under construction.
